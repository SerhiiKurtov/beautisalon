<!DOCTYPE html>
<html>
    <head>
        <title>Послуги салону</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <div class="container mt-5">
            <h1>Доступні послуги</h1>

            <table class="table table-striped table-hover mt-4">
                <thead>
                    <tr>
                        <th>Процедура</th>
                        <th>Ціна</th>
                        <th>Дія</th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in services %}
                    <tr>
                        <td>{{ s.title }}</td>
                        <td>Від {{ s.price }} грн</td>
                        <td>
                            <a href="{% url 'masterservice_list' service_id=s.id %}" 
                            class="btn btn-primary btn-sm">
                            Обрати послугу
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </body>
</html>
