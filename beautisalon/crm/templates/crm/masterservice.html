<!DOCTYPE html>
<html>
    <head>
        <title>Процедури майстрів</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <div class="container mt=5">
            <h1>Послуги майстрів</h1>

            <table class="table table-striped table-hover mt-4">
                <thead>
                    <tr>
                        <th>Mайстер</th>
                        <th>Процедура</th>
                        <th>Ціна</th>
                        <th>Дія</th>
                    </tr>
                </thead>
                <tbody>
                    {% for ms in masters %}
                    <tr>
                        <td>{{ ms.master.name }}</td>
                        <td>{{ ms.service }}</td>
                        <td>{{ ms.price}} грн</td>
                        <td>
                            <a href="{% url 'schedule_list' service_id=ms.service.id master_id=ms.master.id %}" 
                            class="btn btn-primary btn-sm">
                            Вибрати час
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </body>
</html>
