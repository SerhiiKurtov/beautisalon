<!DOCTYPE html>
<html>
<head>
    <title>Розклад салону</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div>
        <h1>Вільні слоти нашого салону</h1>

        <table class="table table-striped table-hover mt-4">
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Час</th>
                    <th>Майстер</th>
                </tr>
            </thead>
            <tbody>
                {% for s in schedules %}
                <tr>
                    <td>{{ s.date|date:"j E Y" }}</td>
                    <td>{{ s.time|time:"H:i" }}</td>
                    <td>{{ s.master.name }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
