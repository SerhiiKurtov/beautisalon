<section id="services" class="py-5">
    <div class="container mt-5">
        <h1 class="main-title text-center">Доступні послуги</h1>

        <table class="table table-striped table-hover mt-4">
            <thead>
                <tr>
                    <th>Процедура</th>
                    <th>Ціна</th>
                    <th>Дія</th>
                </tr>
            </thead>
            <tbody>
                {% for s in services %}
                <tr>
                    <td>{{ s.title }}</td>
                    <td>Від {{ s.price }} грн</td>
                    <td>
                        <a href="{% url 'masterservice_list' service_id=s.id %}" 
                        class="btn btn-primary btn-sm">
                        Обрати послугу
                        </a>
                    </td>
                </tr>
                    {% endfor %}
            </tbody>
        </table>
    </div>
</section>
