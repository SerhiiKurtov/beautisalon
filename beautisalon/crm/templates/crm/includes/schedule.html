<section id="schedules" class="py-5">
    <div class="container mt=5">
        <h1 class="main-title text-center">Вільні слоти нашого салону</h1>

        <h3>Запис до майстра на послугу</h3>
        <table class="table table-striped table-hover mt-4">
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Час</th>
                    <th>Майстер</th>
                    <th>Дія</th>
                </tr>
            </thead>
            <tbody>
                {% for s in schedules %}
                <tr>
                    <td>{{ s.date|date:"j E Y" }}</td>
                    <td>{{ s.time|time:"H:i" }}</td>
                    <td>{{ s.master.name }}</td>
                    <td>
                        <a href="#" class="btn btn-success btn-sm">
                        Записатися</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
