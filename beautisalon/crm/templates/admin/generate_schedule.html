{% extends "admin/base_site.html" %}

{% block content %}
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    {% for obj in queryset %}
        <input type="hidden" name="_selected_action" value="{{ obj.pk }}">
    {% endfor %}
    <input type="hidden" name="action" value="generate_schedule">
    <input type="submit" name="apply" value="Створити графік">
</form>
{% endblock %}
