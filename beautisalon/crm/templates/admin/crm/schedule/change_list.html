{% extends "admin/change_list.html" %}
{% load static %}

{% block extrahead %}
    {{ block.super }}
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/locales/uk.global.min.js"></script>
    <style>
        #calendar {
            max-width: 100%;
            margin: 20px auto;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            color: #333;
        }

        .fc-event {
            border: none !important;
            border-radius: 6px !important;
            padding: 4px 8px !important;
            cursor: pointer;
            line-height: 1.2 !important;
        }

        .event-client-name {
            font-weight: bold;
            display: block;
            font-size: 0.95em;
            margin-bottom: 2px;
        }

        .event-service-title {
            font-style: italic;
            font-size: 0.85em;
            opacity: 0.9;
            display: block;
            border-top: 1px solid rgba(255,255,255,0.3);
            margin-top: 2px;
            padding-top: 2px;
        }

        .fc-col-header-cell {
            background: #343a40;
            color: white;
            padding: 5px 0 !important;
        }

        /* Чіткий час зліва */
        .fc-timegrid-slot-label-cushion {
            color: #ffffff !important;
            font-weight: bold !important;
            font-size: 1.1em !important;
        }

        .fc-timegrid-slot-label {
            background-color: #2c3338 !important;
        }
    </style>
{% endblock %}

{% block result_list %}
    <div id="eventModal" style="display:none; position:fixed; z-index:10001; left:0; top:0; width:100%; height:100%; background-color:rgba(0,0,0,0.7);">
        <div style="background-color:#fff; margin:15% auto; padding:20px; border-radius:12px; width:300px; color:#333; box-shadow: 0 5px 20px rgba(0,0,0,0.5);">
            <span id="closeModal" style="float:right; cursor:pointer; font-size:24px; font-weight:bold;">&times;</span>
            <h3 id="modalTitle" style="margin-top:0; color:#417690;">Деталі запису</h3>
            <hr>
            <p><strong>Клієнт:</strong> <span id="modalClient"></span></p>
            <p><strong>Послуга:</strong> <span id="modalService"></span></p>
            <p><strong>Час:</strong> <span id="modalTime"></span></p>
            <button id="modalEditBtn" style="width:100%; background:#417690; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Редагувати</button>
        </div>
    </div>

    <h1 style="text-align: center; color: #417690; margin-top: 20px; font-weight: bold;">
        Розклад майстра: <span id="masterNameHeader"></span>
    </h1>

    <div id="calendar" style="margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px;"></div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                slotMinTime: '08:00:00',
                slotMaxTime: '20:00:00',
                slotLabelFormat: {
                    hour: '2-digit',
                    minute: '2-digit',
                    omitZeroMinute: false,
                    meridiem: false
                },
                allDaySlot: false,
                firstDay: 1,
                locale: 'uk',
                height: 'auto',
                slotDuration: '00:30:00',
                snapDuration: '00:15:00',
                buttonText: {
                    today: 'Сьогодні',
                    week: 'Тиждень',
                    day: 'День'
                },
                eventClick: function(info) {
                    const event = info.event;
                    const props = event.extendedProps;

                    document.getElementById('modalClient').innerText = props.client_full_name || event.title;
                    document.getElementById('modalService').innerText = props.service_title || 'Не вказано';
                    document.getElementById('modalTime').innerText = event.start.toLocaleTimeString('uk-UA', {hour: '2-digit', minute:'2-digit'});

                    document.getElementById('eventModal').style.display = "block";

                    document.getElementById('modalEditBtn').onclick = function() {
                        window.location.href = event.id + '/change/'; 
                    };
                },
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'timeGridWeek,timeGridDay'
                },
                events: '/api/calendar-data/',                
            });

            document.getElementById('closeModal').onclick = function() {
                document.getElementById('eventModal').style.display = "none";
            };

            window.onclick = function(event) {
                let modal = document.getElementById('eventModal');
                if (event.target == modal) {
                    modal.style.display = "none";
                }
            };

            calendar.render();

            fetch('/api/calendar-data/')
                .then(response => response.json())
                .then(data => {
                    if (data.length > 0 && data[0].extendedProps.master_name) {
                        document.getElementById('masterNameHeader').innerText = data[0].extendedProps.master_name;
                    } else {
                        document.getElementById('masterNameHeader').innerText = "Ірина";
                    }
                });
        });
    </script>

{% endblock %}
