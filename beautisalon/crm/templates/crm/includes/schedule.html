<section id="schedules" class="py-5">
    <div class="container mt=5">
       <h1 class="main-title text-center">Вільні слоти нашого салону</h1> 
       {% for item in master_list %}
            <div class="master-calendar-container mb-5">
                <h3>Графік майстра: {{ item.master.name }}</h3>
                <div id="calendar-{{ item.master.id }}"></div>
            </div>
        {% endfor %}
    </div>
</section>
